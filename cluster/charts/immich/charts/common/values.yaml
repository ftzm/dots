# yaml-language-server: $schema=values.schema.json

# -- Allows for configuring chart-wide settings
global:
  # -- (string) Set the chart name
  nameOverride: null
  # -- (string) Set the chart fullname definition
  fullnameOverride: null
  # -- Always append identifier slugs to resource names, regardless of the enabled
  # resource count.
  alwaysAppendIdentifierToResourceName: false
  # -- Set to true to propagate global metadata to Pod labels.
  propagateGlobalMetadataToPods: false
  # -- Set additional global labels. Helm templates can be used.
  labels: {}
  # -- Set additional global annotations. Helm templates can be used.
  annotations: {}
  # -- When true (default), automatically create a dedicated ServiceAccount using
  # the release name as the identifier if no serviceAccount is explicitly
  # configured. If any serviceAccount entries are present, the default is not
  # created and user configuration takes precedence.
  createDefaultServiceAccount: true

# -- Set the strategy for the default pod options. Defaults to overwrite.
# overwrite: If pod-level options are set, use those instead of the defaults.
# merge: If pod-level options are set, merge them with the defaults.
defaultPodOptionsStrategy: overwrite

# -- Set default options for all controllers / pods here. Each of these options
# can be overridden on a controller level. Useful for setting node selectors,
# tolerations, security contexts, or service accounts that should apply to every
# pod.
defaultPodOptions:
  # -- Set affinity constraint rules. Helm templates can be used. See
  # https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  affinity: {}
    # -- Describes node affinity scheduling rules for the pod.
    # nodeAffinity: {}
      # -- The scheduler will prefer to schedule pods to nodes that satisfy the
      # affinity expressions specified by this field, but it may choose a node that
      # violates one or more of the expressions. The node that is most preferred is
      # the one with the greatest sum of weights, i.e. for each node that meets all of
      # the scheduling requirements (resource request, requiredDuringScheduling
      # affinity expressions, etc.), compute a sum by iterating through the elements
      # of this field and adding "weight" to the sum if the node matches the
      # corresponding matchExpressions; the node(s) with the highest sum are the most
      # preferred.
      # preferredDuringSchedulingIgnoredDuringExecution: []
      # -- If the affinity requirements specified by this field are not met at
      # scheduling time, the pod will not be scheduled onto the node. If the affinity
      # requirements specified by this field cease to be met at some point during pod
      # execution (e.g. due to an update), the system may or may not try to eventually
      # evict the pod from its node.
      # requiredDuringSchedulingIgnoredDuringExecution: {}
        # -- Required. A list of node selector terms. The terms are ORed.
        # nodeSelectorTerms: []
    # -- Describes pod affinity scheduling rules (e.g. co-locate this pod in the
    # same node, zone, etc. as some other pod(s)).
    # podAffinity: {}
      # -- The scheduler will prefer to schedule pods to nodes that satisfy the
      # affinity expressions specified by this field, but it may choose a node that
      # violates one or more of the expressions. The node that is most preferred is
      # the one with the greatest sum of weights, i.e. for each node that meets all of
      # the scheduling requirements (resource request, requiredDuringScheduling
      # affinity expressions, etc.), compute a sum by iterating through the elements
      # of this field and adding "weight" to the sum if the node has pods which
      # matches the corresponding podAffinityTerm; the node(s) with the highest sum
      # are the most preferred.
      # preferredDuringSchedulingIgnoredDuringExecution: []
      # -- If the affinity requirements specified by this field are not met at
      # scheduling time, the pod will not be scheduled onto the node. If the affinity
      # requirements specified by this field cease to be met at some point during pod
      # execution (e.g. due to a pod label update), the system may or may not try to
      # eventually evict the pod from its node. When there are multiple elements, the
      # lists of nodes corresponding to each podAffinityTerm are intersected, i.e. all
      # terms must be satisfied.
      # requiredDuringSchedulingIgnoredDuringExecution: []
    # -- Describes pod anti-affinity scheduling rules (e.g. avoid putting this pod
    # in the same node, zone, etc. as some other pod(s)).
    # podAntiAffinity: {}
      # -- The scheduler will prefer to schedule pods to nodes that satisfy the
      # anti-affinity expressions specified by this field, but it may choose a node
      # that violates one or more of the expressions. The node that is most preferred
      # is the one with the greatest sum of weights, i.e. for each node that meets all
      # of the scheduling requirements (resource request, requiredDuringScheduling
      # anti-affinity expressions, etc.), compute a sum by iterating through the
      # elements of this field and adding "weight" to the sum if the node has pods
      # which matches the corresponding podAffinityTerm; the node(s) with the highest
      # sum are the most preferred.
      # preferredDuringSchedulingIgnoredDuringExecution: []
      # -- If the anti-affinity requirements specified by this field are not met at
      # scheduling time, the pod will not be scheduled onto the node. If the
      # anti-affinity requirements specified by this field cease to be met at some
      # point during pod execution (e.g. due to a pod label update), the system may or
      # may not try to eventually evict the pod from its node. When there are multiple
      # elements, the lists of nodes corresponding to each podAffinityTerm are
      # intersected, i.e. all terms must be satisfied.
      # requiredDuringSchedulingIgnoredDuringExecution: []
  # -- Annotations to set on the item.
  annotations: {}
  # -- Set to true to automatically mount the service account token.
  automountServiceAccountToken: false
  # -- Specifies the DNS parameters of a pod. Parameters specified here will be
  # merged to the generated DNS configuration based on DNSPolicy. Configuring the
  # `ndots` option may resolve nslookup issues on some Kubernetes setups.
  dnsConfig: {}
    # -- A list of DNS name server IP addresses. This will be appended to the base
    # nameservers generated from DNSPolicy. Duplicated nameservers will be removed.
    # nameservers: []
    # -- A list of DNS resolver options. This will be merged with the base options
    # generated from DNSPolicy. Duplicated entries will be removed. Resolution
    # options given in Options will override those that appear in the base
    # DNSPolicy.
    # options: []
    # -- A list of DNS search domains for host-name lookup. This will be appended to
    # the base search paths generated from DNSPolicy. Duplicated search paths will
    # be removed.
    # searches: []
  # -- (string) Configure the Pod DNS policy. Defaults to 'ClusterFirst' if
  # hostNetwork is false and 'ClusterFirstWithHostNet' if hostNetwork is true.
  # dnsPolicy:
  # -- Enable/disable the generation of environment variables for services. See
  # https://kubernetes.io/docs/concepts/services-networking/connect-applications-service/#accessing-the-service
  enableServiceLinks: false
  # -- Use hostAliases to add custom entries to /etc/hosts - mapping IP addresses
  # to hostnames. See
  # https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
  hostAliases: []
  # -- Set to true to use the host's ipc namespace.
  hostIPC: false
  # -- Set to false to disable host networking on the Pod. When using hostNetwork,
  # make sure you set dnsPolicy to 'ClusterFirstWithHostNet'
  hostNetwork: false
  # -- Set to true to use the host's pid namespace.
  hostPID: false
  # -- (bool) Set to false to create a new userns for the Pod. (Requires
  # Kubernetes 1.29 or newer)
  hostUsers: null
  # -- (string) Set the Pod's hostname.
  # hostname:
  # -- Set image pull secrets.
  imagePullSecrets: []
  # -- Labels to set on the item.
  labels: {}
  # -- Node selection constraint. See
  # https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector
  nodeSelector: {}
  # -- (string) Custom priority class for different treatment by the scheduler.
  # priorityClassName:
  # -- Set the resource requests / limits for the Pod. (Requires Kubernetes 1.32
  # or newer)
  resources: {}
    # -- Claims lists the names of resources, defined in spec.resourceClaims, that
    # are used by this container. This is an alpha field and requires enabling the
    # DynamicResourceAllocation feature gate. This field is immutable. It can only
    # be set for containers.
    # claims: []
    # -- Limits describes the maximum amount of compute resources allowed. More
    # info:
    # https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    # limits: {}
    # -- Requests describes the minimum amount of compute resources required. If
    # Requests is omitted for a container, it defaults to Limits if that is
    # explicitly specified, otherwise to an implementation-defined value. Requests
    # cannot exceed Limits. More info:
    # https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
    # requests: {}
  # -- ResourceClaims defines which ResourceClaims must be allocated and reserved
  # before the Pod is allowed to start. The resources will be made available to
  # those containers which consume them by name. (Requires Kubernetes 1.32 or
  # newer)
  resourceClaims: []
  # -- Pod-level resize policy for controlling container restart on resource
  # resize. (Requires Kubernetes 1.36 or newer with
  # InPlacePodLevelResourcesVerticalScaling enabled)
  resizePolicy: []
  # -- (string) Set container restart policy. Defaults to 'Always'. When
  # controller.type is 'cronjob' it defaults to 'Never'.
  # restartPolicy:
  # -- (string) Set a runtimeClassName other than the default one (ie: `nvidia`).
  # runtimeClassName:
  # -- (string) Set a custom scheduler name.
  # schedulerName:
  # -- SchedulingGates is an opaque list of values that if specified will block
  # scheduling the pod. If schedulingGates is not empty, the pod will stay in the
  # SchedulingGated state and the scheduler will not attempt to schedule the pod.
  # See
  # https://kubernetes.io/docs/concepts/scheduling-eviction/pod-scheduling-readiness/
  schedulingGates: []
  # -- Configure the Security Context for the Pod.
  securityContext: {}
    # -- (int) A special supplemental group that applies to all containers in a pod.
    # Some volume types allow the Kubelet to change the ownership of that volume to
    # be owned by the pod: 1. The owning GID will be the FSGroup 2. The setgid bit
    # is set (new files created in the volume will be owned by FSGroup) 3. The
    # permission bits are OR'd with rw-rw---- If unset, the Kubelet will not modify
    # the ownership and permissions of any volume. Note that this field cannot be
    # set when spec.os.name is windows.
    # fsGroup:
    # -- (string) fsGroupChangePolicy defines behavior of changing ownership and
    # permission of the volume before being exposed inside Pod. This field will only
    # apply to volume types which support fsGroup based ownership(and permissions).
    # It will have no effect on ephemeral volume types such as: secret, configmaps
    # and emptydir. Valid values are "OnRootMismatch" and "Always". If not
    # specified, "Always" is used. Note that this field cannot be set when
    # spec.os.name is windows.
    # fsGroupChangePolicy:
    # -- (int) The GID to run the entrypoint of the container process. Uses runtime
    # default if unset. May also be set in SecurityContext. If set in both
    # SecurityContext and PodSecurityContext, the value specified in SecurityContext
    # takes precedence for that container. Note that this field cannot be set when
    # spec.os.name is windows.
    # runAsGroup:
    # -- (bool) Indicates that the container must run as a non-root user. If true,
    # the Kubelet will validate the image at runtime to ensure that it does not run
    # as UID 0 (root) and fail to start the container if it does. If unset or false,
    # no such validation will be performed. May also be set in SecurityContext. If
    # set in both SecurityContext and PodSecurityContext, the value specified in
    # SecurityContext takes precedence.
    # runAsNonRoot:
    # -- (int) The UID to run the entrypoint of the container process. Defaults to
    # user specified in image metadata if unspecified. May also be set in
    # SecurityContext. If set in both SecurityContext and PodSecurityContext, the
    # value specified in SecurityContext takes precedence for that container. Note
    # that this field cannot be set when spec.os.name is windows.
    # runAsUser:
    # -- The SELinux context to be applied to all containers. If unspecified, the
    # container runtime will allocate a random SELinux context for each container.
    # May also be set in SecurityContext. If set in both SecurityContext and
    # PodSecurityContext, the value specified in SecurityContext takes precedence
    # for that container. Note that this field cannot be set when spec.os.name is
    # windows.
    # seLinuxOptions: {}
      # -- (string) Level is SELinux level label that applies to the container.
      # level:
      # -- (string) Role is a SELinux role label that applies to the container.
      # role:
      # -- (string) Type is a SELinux type label that applies to the container.
      # type:
      # -- (string) User is a SELinux user label that applies to the container.
      # user:
    # -- The seccomp options to use by the containers in this pod. Note that this
    # field cannot be set when spec.os.name is windows.
    # seccompProfile: {}
      # -- (string) localhostProfile indicates a profile defined in a file on the node
      # should be used. The profile must be preconfigured on the node to work. Must be
      # a descending path, relative to the kubelet's configured seccomp profile
      # location. Must be set if type is "Localhost". Must NOT be set for any other
      # type.
      # localhostProfile:
      # -- type indicates which kind of seccomp profile will be applied. Valid options
      # are: Localhost - a profile defined in a file on the node should be used.
      # RuntimeDefault - the container runtime default profile should be used.
      # Unconfined - no profile should be applied.
      # type: ""
    # -- A list of groups applied to the first process run in each container, in
    # addition to the container's primary GID, the fsGroup (if specified), and group
    # memberships defined in the container image for the uid of the container
    # process. If unspecified, no additional groups are added to any container. Note
    # that group memberships defined in the container image for the uid of the
    # container process are still effective, even if they are not included in this
    # list. Note that this field cannot be set when spec.os.name is windows.
    # supplementalGroups: []
    # -- (string) Defines how supplemental groups of the the first process in each
    # container are calculated. Valid values are "Merge" and "Strict". If not
    # specified, "Merge" is used. Note that this field cannot be set when
    # spec.os.name is windows.
    # supplementalGroupsPolicy:
    # -- Sysctls hold a list of namespaced sysctls used for the pod. Pods with
    # unsupported sysctls (by the container runtime) might fail to launch. Note that
    # this field cannot be set when spec.os.name is windows.
    # sysctls: []
  # -- (bool) Allows sharing process namespace between containers in a Pod. See
  # https://kubernetes.io/docs/tasks/configure-pod-container/share-process-namespace/
  shareProcessNamespace: null
  # -- (int) Duration in seconds the pod needs to terminate gracefully. See
  # https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle
  terminationGracePeriodSeconds: null
  # -- Specify taint tolerations. See
  # https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations: []
  # -- Defines topologySpreadConstraint rules. See
  # https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
  topologySpreadConstraints: []

# -- Define the Pod controllers to be generated by the chart. Each key is a
# controller identifier. Supported types: deployment (default), statefulset,
# daemonset, cronjob, job.
# @default -- See below

#   controllers:
#     main:
#       containers:
#         main:
#           image:
#             repository: nginx
#             tag: latest
controllers: {}
