apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audiobookshelf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiobookshelf
    spec:
      containers:
      - image: advplyr/audiobookshelf:2.34.0
        name: audiobookshelf
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /audiobooks
          name: audiobooks
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: audiobookshelf-config
      - name: audiobooks
        persistentVolumeClaim:
          claimName: audiobooks
