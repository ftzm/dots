apiVersion: v1
data:
  homepage-overview.json: |-
    {
        "panels": [
            {
                "fieldConfig": {
                    "defaults": {
                        "max": 100,
                        "min": 0,
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "unit": "percent"
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 0,
                    "y": 0
                },
                "id": 1,
                "targets": [
                    {
                        "expr": "100 * (1 - node_filesystem_avail_bytes{instance=\"nas\",mountpoint=\"/pool-1\"} / node_filesystem_size_bytes{instance=\"nas\",mountpoint=\"/pool-1\"})",
                        "legendFormat": "pool-1"
                    }
                ],
                "title": "NFS Pool Usage",
                "type": "gauge"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 6,
                    "y": 0
                },
                "id": 2,
                "targets": [
                    {
                        "expr": "count(kube_pod_status_phase{phase!=\"Running\",phase!=\"Succeeded\"} == 1) or vector(0)",
                        "legendFormat": "Unhealthy"
                    }
                ],
                "title": "Unhealthy Pods",
                "type": "stat"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 3
                                },
                                {
                                    "color": "red",
                                    "value": 10
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 12,
                    "y": 0
                },
                "id": 3,
                "targets": [
                    {
                        "expr": "floor(sum(increase(kube_pod_container_status_restarts_total[1h])))",
                        "legendFormat": "Restarts"
                    }
                ],
                "title": "Pod Restarts (1h)",
                "type": "stat"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 18,
                    "y": 0
                },
                "id": 4,
                "targets": [
                    {
                        "expr": "count(ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}) or vector(0)",
                        "legendFormat": "Alerts"
                    }
                ],
                "title": "Firing Alerts",
                "type": "stat"
            }
        ],
        "refresh": "30s",
        "schemaVersion": 39,
        "tags": [
            "homepage"
        ],
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "timezone": "browser",
        "title": "Homepage Overview",
        "uid": "homepage-overview"
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: homepage-overview-dashboard
  namespace: monitoring
