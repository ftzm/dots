apiVersion: v1
data:
  homepage-overview.json: |-
    {
        "panels": [
            {
                "description": "NFS Pool",
                "fieldConfig": {
                    "defaults": {
                        "max": 100,
                        "min": 0,
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "unit": "percent"
                    }
                },
                "gridPos": {
                    "h": 5,
                    "w": 4,
                    "x": 0,
                    "y": 0
                },
                "id": 1,
                "targets": [
                    {
                        "expr": "100 * (1 - node_filesystem_avail_bytes{instance=\"nas\",mountpoint=\"/pool-1\"} / node_filesystem_size_bytes{instance=\"nas\",mountpoint=\"/pool-1\"})",
                        "legendFormat": "pool-1"
                    }
                ],
                "title": "",
                "transparent": true,
                "type": "gauge"
            },
            {
                "description": "Unhealthy Pods",
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 5,
                    "w": 4,
                    "x": 4,
                    "y": 0
                },
                "id": 2,
                "targets": [
                    {
                        "expr": "count(kube_pod_status_phase{phase!=\"Running\",phase!=\"Succeeded\"} == 1) or vector(0)",
                        "legendFormat": "Unhealthy"
                    }
                ],
                "title": "",
                "transparent": true,
                "type": "stat"
            },
            {
                "description": "Restarts (1h)",
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 3
                                },
                                {
                                    "color": "red",
                                    "value": 10
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 5,
                    "w": 4,
                    "x": 8,
                    "y": 0
                },
                "id": 3,
                "targets": [
                    {
                        "expr": "floor(sum(increase(kube_pod_container_status_restarts_total[1h])))",
                        "legendFormat": "Restarts"
                    }
                ],
                "title": "",
                "transparent": true,
                "type": "stat"
            },
            {
                "description": "Firing Alerts",
                "fieldConfig": {
                    "defaults": {

                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Severity"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 80
                                }
                            ]
                        }
                    ]
                },
                "gridPos": {
                    "h": 5,
                    "w": 12,
                    "x": 12,
                    "y": 0
                },
                "id": 4,
                "options": {
                    "footer": {
                        "show": false
                    },
                    "showHeader": true
                },
                "targets": [
                    {
                        "expr": "ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}",
                        "format": "table",
                        "instant": true,
                        "legendFormat": ""
                    }
                ],
                "title": "",
                "transformations": [
                    {
                        "id": "organize",
                        "options": {
                            "excludeByName": {
                                "Time": true,
                                "Value": true,
                                "__name__": true,
                                "alertstate": true,
                                "container": true,
                                "endpoint": true,
                                "instance": true,
                                "job": true,
                                "pod": true,
                                "prometheus": true,
                                "service": true,
                                "uid": true
                            },
                            "renameByName": {
                                "alertname": "Alert",
                                "namespace": "Namespace",
                                "severity": "Severity"
                            }
                        }
                    }
                ],
                "transparent": true,
                "type": "table"
            }
        ],
        "refresh": "30s",
        "schemaVersion": 39,
        "tags": [
            "homepage"
        ],
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "timepicker": {
            "hidden": true
        },
        "timezone": "browser",
        "title": "Homepage Overview",
        "uid": "homepage-overview"
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: homepage-overview-dashboard
  namespace: monitoring
