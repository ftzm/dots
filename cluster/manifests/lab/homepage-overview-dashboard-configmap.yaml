apiVersion: v1
data:
  homepage-overview.json: |-
    {
        "panels": [
            {
                "fieldConfig": {
                    "defaults": {
                        "max": 100,
                        "min": 0,
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "unit": "percent"
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 0,
                    "y": 0
                },
                "id": 1,
                "targets": [
                    {
                        "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                        "legendFormat": "CPU"
                    }
                ],
                "title": "CPU Usage",
                "type": "gauge"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "max": 100,
                        "min": 0,
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "unit": "percent"
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 6,
                    "y": 0
                },
                "id": 2,
                "targets": [
                    {
                        "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
                        "legendFormat": "Memory"
                    }
                ],
                "title": "Memory Usage",
                "type": "gauge"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 12,
                    "y": 0
                },
                "id": 3,
                "targets": [
                    {
                        "expr": "count(kube_pod_status_phase{phase!=\"Running\",phase!=\"Succeeded\"}) or vector(0)",
                        "legendFormat": "Not Ready"
                    }
                ],
                "title": "Pods Not Ready",
                "type": "stat"
            },
            {
                "fieldConfig": {
                    "defaults": {
                        "max": 100,
                        "min": 0,
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": 0
                                },
                                {
                                    "color": "yellow",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "unit": "percent"
                    }
                },
                "gridPos": {
                    "h": 8,
                    "w": 6,
                    "x": 18,
                    "y": 0
                },
                "id": 4,
                "targets": [
                    {
                        "expr": "100 * (1 - node_filesystem_avail_bytes{mountpoint=\"/pool-1\"} / node_filesystem_size_bytes{mountpoint=\"/pool-1\"})",
                        "legendFormat": "Disk"
                    }
                ],
                "title": "NFS Disk Usage",
                "type": "gauge"
            }
        ],
        "refresh": "30s",
        "schemaVersion": 39,
        "tags": [
            "homepage"
        ],
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "timezone": "browser",
        "title": "Homepage Overview",
        "uid": "homepage-overview"
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: homepage-overview-dashboard
  namespace: monitoring
