apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultwarden
    spec:
      containers:
      - env:
        - name: DOMAIN
          value: https://vaultwarden.lan.ftzmlab.xyz
        - name: ROCKET_PORT
          value: "80"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              key: ADMIN_TOKEN
              name: vaultwarden-env
        image: vaultwarden/server:1.36.0
        name: vaultwarden
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - mountPath: /data
          name: config
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: vaultwarden-config
