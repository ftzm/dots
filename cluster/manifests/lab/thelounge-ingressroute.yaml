apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: thelounge
  namespace: thelounge
spec:
  entryPoints:
  - privateweb
  - privatesecure
  - wgweb
  - wgsecure
  routes:
  - kind: Rule
    match: Host(`irc.lan.ftzmlab.xyz`)
    services:
    - name: thelounge
      port: 9000
  tls: {}
