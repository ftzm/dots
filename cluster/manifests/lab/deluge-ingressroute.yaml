apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: deluge
  namespace: default
spec:
  entryPoints:
  - privateweb
  - privatesecure
  - wgweb
  - wgsecure
  routes:
  - kind: Rule
    match: Host(`deluge.lan.ftzmlab.xyz`)
    services:
    - name: deluge
      port: 8112
  tls: {}
