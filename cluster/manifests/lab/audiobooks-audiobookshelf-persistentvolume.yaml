apiVersion: v1
kind: PersistentVolume
metadata:
  name: audiobooks-audiobookshelf
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 100Gi
  nfs:
    path: /pool-1/mediastack/media/audiobooks
    server: 192.168.1.3
  persistentVolumeReclaimPolicy: Retain
  storageClassName: audiobooks-audiobookshelf
