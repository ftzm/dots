apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-db-backup
  namespace: immich
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - args:
            - pg_dump --format=custom --file=/backup/immich-db-backup-$(date +%Y%m%d-%H%M%S).dump
              && find /backup -name "*.dump" -mtime +7 -delete
            command:
            - /bin/sh
            - -c
            env:
            - name: PGHOST
              value: immich-database-rw
            - name: PGUSER
              value: immich
            - name: PGDATABASE
              value: immich
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: immich-database-app
            image: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
            name: pg-dump
            volumeMounts:
            - mountPath: /backup
              name: backup
          restartPolicy: OnFailure
          securityContext:
            supplementalGroups:
            - 1001
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: immich-db-backup
  schedule: 0 3 * * *
  successfulJobsHistoryLimit: 3
