apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
    spec:
      containers:
      - env:
        - name: FORGEJO__server__DOMAIN
          value: forgejo.lan.ftzmlab.xyz
        - name: FORGEJO__server__ROOT_URL
          value: https://forgejo.lan.ftzmlab.xyz/
        - name: FORGEJO__server__SSH_DOMAIN
          value: forgejo.lan.ftzmlab.xyz
        - name: FORGEJO__server__SSH_PORT
          value: "30022"
        - name: FORGEJO__server__SSH_LISTEN_PORT
          value: "22"
        - name: FORGEJO__database__DB_TYPE
          value: sqlite3
        - name: FORGEJO__service__DISABLE_REGISTRATION
          value: "true"
        - name: FORGEJO__security__INSTALL_LOCK
          value: "true"
        - name: FORGEJO__actions__ENABLED
          value: "true"
        image: codeberg.org/forgejo/forgejo:15.0.3
        name: forgejo
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 22
          name: ssh
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: forgejo-data
