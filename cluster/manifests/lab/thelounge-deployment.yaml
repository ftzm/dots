apiVersion: apps/v1
kind: Deployment
metadata:
  name: thelounge
  namespace: thelounge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thelounge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thelounge
    spec:
      containers:
      - image: thelounge/thelounge:4.4.3
        name: thelounge
        ports:
        - containerPort: 9000
          name: http
        volumeMounts:
        - mountPath: /var/opt/thelounge
          name: config
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: thelounge-config
