    version: "1.8.2"
  - chart: sealed-secrets/sealed-secrets
    version: "2.18.6"
  - chart: jetstack/cert-manager
    version: "v1.20.2"
  - chart: sops-secrets-operator/sops-secrets-operator
    version: "0.27.1"
  - chart: immich/immich
    version: "0.12.0"
  - chart: cloudnative-pg/cloudnative-pg
    version: "0.28.2"
  - chart: jameswynn/homepage
    version: "2.1.0"
