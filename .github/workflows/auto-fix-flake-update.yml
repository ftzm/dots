name: Auto-fix flake update failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-fix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch == 'update_flake_lock_action'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Find triggering PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --state open \
            --json number,labels \
            --jq '[.[] | select(.labels[].name == "automated")][0].number')
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "No automated PR found for branch ${{ github.event.workflow_run.head_branch }}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Checkout failing commit
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Nix
        if: steps.pr.outputs.skip != 'true'
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Magic Nix cache
        if: steps.pr.outputs.skip != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Collect failed CI logs
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p /tmp/ci
          gh run view ${{ github.event.workflow_run.id }} \
            --repo "${{ github.repository }}" \
            --log-failed > /tmp/ci/failed.log || true
          # Bound token usage by keeping only the tail
          tail -c 200000 /tmp/ci/failed.log > /tmp/ci/failed.trimmed.log
          mv /tmp/ci/failed.trimmed.log /tmp/ci/failed.log
          wc -l /tmp/ci/failed.log

      - name: Claude auto-fix
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PAT_TOKEN }}
          prompt: |
            CI failed on the automated flake.lock update PR
            #${{ steps.pr.outputs.pr_number }} (branch
            `${{ github.event.workflow_run.head_branch }}`,
            commit ${{ github.event.workflow_run.head_sha }}).

            The failed CI log is at /tmp/ci/failed.log. Read it, diagnose the
            breakage caused by the new flake inputs, and fix the Nix config so
            each affected NixOS configuration builds again. Hosts built in CI:
            saoiste, eachtrai, nuc, nas. Verify locally with
            `nix build .#nixosConfigurations.<host>.config.system.build.toplevel`
            before opening the PR.

            Constraints:
            - Only adapt the config to upstream API changes. Do NOT add
              features, refactor unrelated code, or modify flake.lock.
            - If the failure is transient (network, cache, infra) and not a
              real config break, exit without opening a PR.
            - Create a new branch off the current HEAD named
              `claude/fix-flake-update-${{ steps.pr.outputs.pr_number }}`.
            - Open a PR via `gh pr create` targeting
              `${{ github.event.workflow_run.head_branch }}` (NOT master), so
              merging the fix lets the existing flake-update PR pass CI and
              auto-merge.
            - Title: `fix: adapt config to flake.lock update (#${{ steps.pr.outputs.pr_number }})`
            - Body: short explanation of what upstream changed and what you
              changed in response.
          claude_args: |
            --max-turns 40
            --allowedTools Read,Edit,Write,Bash
